# Legacy UE5 CI — superseded by ADR-034 (Unity).
# Manual runs only; requires self-hosted Windows runner with label `ue5` and UE_ROOT.
name: compile-editor-legacy

on:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: [self-hosted, windows, ue5]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build editor target
        shell: pwsh
        env:
          UE_ROOT: ${{ env.UE_ROOT }}
        run: ./Scripts/Build-Editor.ps1

      - name: Initialize test content
        shell: pwsh
        env:
          UE_ROOT: ${{ env.UE_ROOT }}
        run: ./Scripts/Initialize-Content.ps1

      - name: Run foundation automation tests
        shell: pwsh
        env:
          UE_ROOT: ${{ env.UE_ROOT }}
        run: ./Scripts/Run-FoundationTests.ps1

      - name: Run flight automation tests
        shell: pwsh
        env:
          UE_ROOT: ${{ env.UE_ROOT }}
        run: ./Scripts/Run-FlightTests.ps1
