# Unity CI — enabled when Client/ exists (REQ-051).
# Uses game-ci/unity-builder; configure UNITY_LICENSE or self-hosted runner secrets.
name: unity-ci

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'Client/**'
      - '.github/workflows/unity-ci.yml'
      - 'Scripts/Run-UnityTests.ps1'
  push:
    branches:
      - main
    paths:
      - 'Client/**'
      - '.github/workflows/unity-ci.yml'
      - 'Scripts/Run-UnityTests.ps1'

jobs:
  editmode-tests:
    if: ${{ hashFiles('Client/ProjectSettings/ProjectVersion.txt') != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          projectPath: Client
          unityVersion: 6000.0.32f1
          testMode: editmode

  placeholder:
    if: ${{ hashFiles('Client/ProjectSettings/ProjectVersion.txt') == '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Unity project not bootstrapped
        run: echo "Skipping — Client/ not created yet (REQ-051)."
